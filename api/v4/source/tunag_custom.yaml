  "/api/v4/tunag_custom/roles":
    get:
      tags:
        - tunag_custom
      summary: Get all custom roles for tunag
      description: |
        Get a list of all custom roles created by the tunag feature.

        ##### Permissions
        Must have `manage_roles` permission.
      operationId: GetAllTunagCustomRoles
      responses:
        "200":
          description: Custom roles retrieval successful.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Role"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  "/api/v4/tunag_custom/roles/{role_group}":
    get:
      tags:
        - tunag_custom
      summary: Get custom roles for a group for tunag
      description: |
        Get a list of custom roles for a specific group created by the tunag feature.

        ##### Permissions
        Must have `manage_roles` permission.
      operationId: GetTunagCustomRoles
      parameters:
        - name: role_group
          in: path
          description: The role group name.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Custom roles retrieval successful.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Role"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  "/api/v4/tunag_custom/roles/enable/{role_group}":
    post:
      tags:
        - tunag_custom
      summary: Enable custom roles for a group for tunag
      description: |
        Enables the custom roles for a given group. If the roles do not exist, they will be created. If they are soft-deleted, they will be restored.

        ##### Permissions
        Must have `manage_roles` permission.
      operationId: EnableTunagCustomRoles
      parameters:
        - name: role_group
          in: path
          description: The role group name.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Custom roles enabled successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Role"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  "/api/v4/tunag_custom/roles/disable/{role_group}":
    delete:
      tags:
        - tunag_custom
      summary: Disable custom roles for a group for tunag
      description: |
        Disables the custom roles for a given group by soft-deleting them.

        ##### Permissions
        Must have `manage_roles` permission.
      operationId: DisableTunagCustomRoles
      parameters:
        - name: role_group
          in: path
          description: The role group name.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Custom roles disabled successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
